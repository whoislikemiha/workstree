version: 2

project_name: workstree

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  footer: |
    ## Install

    ```console
    $ curl -fsSL https://raw.githubusercontent.com/whoislikemiha/workstree/main/install.sh | sh
    ```
